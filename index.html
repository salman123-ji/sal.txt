<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Bookstore</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body, .bookstore-wrapper {
      height: 100%;
      width: 100%;
    }

    .bookstore-wrapper {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Georgia', serif;
      overflow-auto;
      padding: 2rem;
    }

    .bookstore-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      color: white;
    }

    .store-title {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .store-tagline {
      font-size: 1.2rem;
      opacity: 0.9;
      font-style: italic;
    }

    .search-container {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
    }

    .search-box {
      width: 100%;
      max-width: 600px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      outline: none;
      font-family: 'Georgia', serif;
    }

    .search-box:focus {
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .book-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .book-cover {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }

    .book-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .book-author {
      font-size: 1rem;
      color: #718096;
      font-style: italic;
      margin-bottom: 1rem;
    }

    .book-description {
      font-size: 0.9rem;
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .book-price {
      font-size: 1.3rem;
      font-weight: bold;
      color: #667eea;
    }

    .no-results {
      text-align: center;
      color: white;
      font-size: 1.5rem;
      margin-top: 3rem;
      opacity: 0.9;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
 </head>
 <body>
  <div class="bookstore-wrapper">
   <div class="bookstore-container">
    <header class="header">
     <h1 class="store-title" id="storeTitle">The Book Haven</h1>
     <p class="store-tagline" id="storeTagline">Discover Your Next Great Read</p>
    </header>
    <div class="search-container"><input type="text" class="search-box" id="searchBox" placeholder="Search books by title or author..." aria-label="Search books">
    </div>
    <div class="books-grid" id="booksGrid"></div>
    <div class="no-results" id="noResults" style="display: none;">
     No books found matching your search.
    </div>
   </div>
  </div>
  <script>
    const books = [
      {
        title: "The Midnight Library",
        author: "Matt Haig",
        description: "A dazzling novel about all the choices that go into a life well lived.",
        price: "$16.99",
        emoji: "📚"
      },
      {
        title: "Where the Crawdads Sing",
        author: "Delia Owens",
        description: "A mysterious and moving story of a young girl who raised herself in the marshes.",
        price: "$18.99",
        emoji: "🦋"
      },
      {
        title: "Atomic Habits",
        author: "James Clear",
        description: "An easy and proven way to build good habits and break bad ones.",
        price: "$14.99",
        emoji: "⚡"
      },
      {
        title: "The Silent Patient",
        author: "Alex Michaelides",
        description: "A gripping psychological thriller about a woman who stops speaking.",
        price: "$15.99",
        emoji: "🤫"
      },
      {
        title: "Educated",
        author: "Tara Westover",
        description: "A memoir about a young woman who leaves her survivalist family.",
        price: "$17.99",
        emoji: "🎓"
      },
      {
        title: "The Seven Husbands of Evelyn Hugo",
        author: "Taylor Jenkins Reid",
        description: "A legendary film actress tells the story of her glamorous life.",
        price: "$16.99",
        emoji: "⭐"
      },
      {
        title: "Sapiens",
        author: "Yuval Noah Harari",
        description: "A brief history of humankind from the Stone Age to the modern age.",
        price: "$19.99",
        emoji: "🌍"
      },
      {
        title: "The Song of Achilles",
        author: "Madeline Miller",
        description: "A retelling of the Trojan War through the eyes of Patroclus.",
        price: "$15.99",
        emoji: "⚔️"
      },
      {
        title: "Becoming",
        author: "Michelle Obama",
        description: "An intimate memoir by the former First Lady of the United States.",
        price: "$20.99",
        emoji: "🌟"
      }
    ];

    let allBooks = [...books];
    let filteredBooks = [...books];

    const defaultConfig = {
      store_title: "The Book Haven",
      store_tagline: "Discover Your Next Great Read",
      search_placeholder: "Search books by title or author...",
      background_gradient_start: "#667eea",
      background_gradient_end: "#764ba2",
      card_background: "#ffffff",
      title_color: "#2d3748",
      author_color: "#718096",
      price_color: "#667eea"
    };

    function renderBooks() {
      const booksGrid = document.getElementById('booksGrid');
      const noResults = document.getElementById('noResults');

      if (filteredBooks.length === 0) {
        booksGrid.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      booksGrid.style.display = 'grid';
      noResults.style.display = 'none';
      
      booksGrid.innerHTML = filteredBooks.map(book => `
        <div class="book-card">
          <div class="book-cover">${book.emoji}</div>
          <h2 class="book-title">${book.title}</h2>
          <p class="book-author">by ${book.author}</p>
          <p class="book-description">${book.description}</p>
          <div class="book-price">${book.price}</div>
        </div>
      `).join('');
    }

    function handleSearch(event) {
      const searchTerm = event.target.value.toLowerCase().trim();
      
      if (searchTerm === '') {
        filteredBooks = [...allBooks];
      } else {
        filteredBooks = allBooks.filter(book => 
          book.title.toLowerCase().includes(searchTerm) || 
          book.author.toLowerCase().includes(searchTerm)
        );
      }
      
      renderBooks();
    }

    async function onConfigChange(config) {
      const storeTitle = document.getElementById('storeTitle');
      const storeTagline = document.getElementById('storeTagline');
      const searchBox = document.getElementById('searchBox');
      const wrapper = document.querySelector('.bookstore-wrapper');
      const bookCards = document.querySelectorAll('.book-card');
      const bookTitles = document.querySelectorAll('.book-title');
      const bookAuthors = document.querySelectorAll('.book-author');
      const bookPrices = document.querySelectorAll('.book-price');

      storeTitle.textContent = config.store_title || defaultConfig.store_title;
      storeTagline.textContent = config.store_tagline || defaultConfig.store_tagline;
      searchBox.placeholder = config.search_placeholder || defaultConfig.search_placeholder;

      wrapper.style.background = `linear-gradient(135deg, ${config.background_gradient_start || defaultConfig.background_gradient_start} 0%, ${config.background_gradient_end || defaultConfig.background_gradient_end} 100%)`;

      bookCards.forEach(card => {
        card.style.background = config.card_background || defaultConfig.card_background;
      });

      bookTitles.forEach(title => {
        title.style.color = config.title_color || defaultConfig.title_color;
      });

      bookAuthors.forEach(author => {
        author.style.color = config.author_color || defaultConfig.author_color;
      });

      bookPrices.forEach(price => {
        price.style.color = config.price_color || defaultConfig.price_color;
      });
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_gradient_start || defaultConfig.background_gradient_start,
            set: (value) => {
              config.background_gradient_start = value;
              window.elementSdk.setConfig({ background_gradient_start: value });
            }
          },
          {
            get: () => config.background_gradient_end || defaultConfig.background_gradient_end,
            set: (value) => {
              config.background_gradient_end = value;
              window.elementSdk.setConfig({ background_gradient_end: value });
            }
          },
          {
            get: () => config.card_background || defaultConfig.card_background,
            set: (value) => {
              config.card_background = value;
              window.elementSdk.setConfig({ card_background: value });
            }
          },
          {
            get: () => config.title_color || defaultConfig.title_color,
            set: (value) => {
              config.title_color = value;
              window.elementSdk.setConfig({ title_color: value });
            }
          },
          {
            get: () => config.price_color || defaultConfig.price_color,
            set: (value) => {
              config.price_color = value;
              window.elementSdk.setConfig({ price_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["store_title", config.store_title || defaultConfig.store_title],
        ["store_tagline", config.store_tagline || defaultConfig.store_tagline],
        ["search_placeholder", config.search_placeholder || defaultConfig.search_placeholder]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    document.getElementById('searchBox').addEventListener('input', handleSearch);

    renderBooks();
  </script>

</html>
